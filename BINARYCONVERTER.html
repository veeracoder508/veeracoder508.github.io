<!DOCTYPE html>
<html>
<head>
    <title>BINARY CONVERTER BY VEERARAVAN</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin: 50px;
        }
        input[type="text"] {
            width: 200px;
            padding: 10px;
            margin: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>BINARY CONVERTER BY VEERARAVAN</h1>

    <input type="text" id="inputString" placeholder="Enter String">
    <button onclick="convertToBinary()">Convert to Binary</button>

    <p id="result"></p>

    <script>
        function convertToBinary() {
            const inputString = document.getElementById("inputString").value;
            let binaryString = "";

            for (let i = 0; i < inputString.length; i++) {
                const charCode = inputString.charCodeAt(i);
                binaryString += charCode.toString(2) + " "; 
            }

            document.getElementById("result").innerHTML = "Binary Representation: " + binaryString;
        }
    </script>

</body>
</html>
