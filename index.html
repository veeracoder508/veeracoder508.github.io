<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerShell Calculator</title>
    <style>
        body {
            background-color: #012456; /* PowerShell Blue */
            color: #f0f0f0; /* Light Gray Text */
            font-family: Consolas, monospace; /* Monospace Font */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .calculator {
            background-color: #001845; /* Darker PowerShell Blue */
            border: 2px solid #003262; /* Slightly Lighter Border */
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 300px;
        }

        .display {
            background-color: #003262; /* Display Background */
            color: #f0f0f0;
            border: none;
            border-radius: 4px;
            padding: 10px;
            font-size: 18px;
            width: calc(100% - 22px); /* Account for padding */
            margin-bottom: 10px;
            text-align: right;
            overflow: hidden; /* Prevent text overflow */
        }
        .display:focus{
            outline: none; /* Remove default focus outline */
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        button {
            background-color: #003262; /* Button Background */
            color: #f0f0f0;
            border: none;
            border-radius: 4px;
            padding: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s; /* Smooth Hover Effect */
        }

        button:hover {
            background-color: #004e89; /* Slightly Lighter Hover */
        }

        .operator {
            background-color: #3c78d8; /* Distinct Operator Color */
        }
        .clear{
            background-color: #c0392b; /* Distinct Clear/Delete Color */
        }
        .equal {
            background-color: #27ae60; /* Distinct Equal Color */
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" class="display" readonly>
        <div class="buttons">
            <button onclick="clearDisplay()" class="clear">C</button>
            <button onclick="backspace()" class="clear">DEL</button>
            <button onclick="appendOperator('/')" class="operator">/</button>
            <button onclick="appendOperator('*')" class="operator">*</button>

            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button onclick="appendOperator('-')" class="operator">-</button>

            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button onclick="appendOperator('+')" class="operator">+</button>

            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button onclick="calculate()" class="equal">=</button>

            <button onclick="appendNumber('0')">0</button>
            <button onclick="appendNumber('.')">.</button>
            <button onclick="appendOperator('%')" class="operator">%</button>

        </div>
    </div>

    <script>
        let display = document.getElementById('display');

        function appendNumber(number) {
            display.value += number;
        }

        function appendOperator(operator) {
            display.value += operator;
        }

        function calculate() {
            try {
                display.value = eval(display.value); // Use eval cautiously!
            } catch (error) {
                display.value = 'Error';
            }
        }

        function clearDisplay() {
            display.value = '';
        }
        function backspace(){
            display.value = display.value.slice(0, -1);
        }
    </script>

</body>
</html>
