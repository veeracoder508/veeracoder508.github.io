<!DOCTYPE html>
<html>
<head>
<title>Simple BASIC Interpreter</title>
<style>
body {
  font-family: monospace;
}
#code {
  width: 80%;
  height: 200px;
  border: 1px solid #ccc;
  font-family: monospace;
  padding: 5px;
}
#output {
  margin-top: 10px;
  border: 1px solid #ccc;
  padding: 5px;
  overflow-y: scroll;
  height: 200px;
}
</style>
</head>
<body>

<h1>Simple BASIC Interpreter</h1>

<textarea id="code" placeholder="Enter your BASIC code here..."></textarea><br>
<button onclick="runCode()">Run</button>

<div id="output"></div>

<script>
function runCode() {
  const code = document.getElementById("code").value;
  const outputDiv = document.getElementById("output");
  outputDiv.innerHTML = ""; // Clear previous output

  const lines = code.split("\n");
  const variables = {}; // Store variables

  for (const line of lines) {
    const trimmedLine = line.trim();
    if (trimmedLine === "") continue; // Skip empty lines

    try {
      const parts = trimmedLine.split(" ");
      const command = parts[0].toUpperCase();

      switch (command) {
        case "PRINT":
          const value = evaluate(trimmedLine.substring(command.length).trim(), variables);
          outputDiv.innerHTML += value + "<br>";
          break;
        case "LET": // Example: LET X = 10
          const assignmentParts = trimmedLine.substring(command.length).trim().split("=");
          const varName = assignmentParts[0].trim();
          const varValue = evaluate(assignmentParts[1].trim(), variables);
          variables[varName] = varValue;
          break;
        // Add more commands (e.g., INPUT, GOTO, IF, etc.) here
        default:
          outputDiv.innerHTML += "Unknown command: " + command + "<br>";
      }
    } catch (error) {
      outputDiv.innerHTML += "Error: " + error.message + "<br>";
      break; // Stop execution on error
    }
  }
}


function evaluate(expression, variables) {
    expression = expression.trim();
    if (/^".*"$/.test(expression)) { // String literal
        return expression.slice(1, -1); // Remove quotes
    } else if (/^[0-9.]+$/.test(expression)) { // Number
        return parseFloat(expression);
    } else if (variables.hasOwnProperty(expression)) { // Variable
        return variables[expression];
    } else { // Simple expression evaluation (add more operators as needed)
        try {
            return eval(expression); // Use eval cautiously!  Consider a safer expression parser.
        } catch (e) {
            throw new Error("Invalid expression: " + expression);
        }
    }
}

</script>

</body>
</html>
