<html>
<head>
<title>Simple BASIC Interpreter</title>
<style>
body {
  font-family: monospace;
}
#code {
  width: 80%;
  height: 200px;
  border: 1px solid #ccc;
  font-family: monospace;
  padding: 5px;
}
#output {
  margin-top: 10px;
  border: 1px solid #ccc;
  padding: 5px;
  overflow-y: scroll;
  height: 200px;
}
</style>
</head>
<body>

<h1>Simple BASIC Interpreter</h1>

<textarea id="code" placeholder="Enter your BASIC code here..."></textarea><br>
<button onclick="runCode()">Run</button>

<div id="output"></div>

  outputDiv = document.getElementById("output");

    const parts = trimmedLine.split(" ");
    if (parts[0].endsWith(":")) {
        lineLabels[parts[0].slice(0, -1)] = lineNumber;
    }
    lineNumber++;

          outputDiv.innerHTML += value + "<br>";
          break;

          const varValue = evaluate(assignmentParts[1].trim(), variables, arrays);
          variables[varName] = varValue;

          const inputValue = prompt ? window.prompt(prompt) : window.prompt("Enter value:");
          if (inputValue === null) { // Handle cancel
              throw new Error("Input cancelled.");
          }
          inputQueue.push(inputValue);
          break;
        case "GOTO":
            const label = parts[1];
            if (lineLabels.hasOwnProperty(label)) {
                i = lineLabels[label] - 1; // -1 because the loop increments i
            } else {
                throw new Error("Label not found: " + label);
            }
            break;

            const condition = trimmedLine.substring(command.length).trim();
            const conditionResult = evaluate(condition, variables, arrays);
            if (conditionResult) {
                // Continue to the next statement (no ELSE implemented yet)
            } else {
                // Skip to the next line or a GOTO if present.
                if (parts.includes("GOTO")) {
                    const gotoIndex = parts.indexOf("GOTO") + 1;
                    const label = parts[gotoIndex];
                    if (lineLabels.hasOwnProperty(label)) {
                        i = lineLabels[label] - 1;
                    } else {
                        throw new Error("Label not found: " + label);
                    }

                    // Find the next ELSE or ENDIF at the same IF level (not implemented yet)

                    let endifFound = false;

                            ifLevel++;
                        } else if (nextLine.startsWith("ENDIF")) {
                            ifLevel--;
                            if (ifLevel === 0) {
                                endifFound = true;
                                i = j;
                                break;
