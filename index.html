<!DOCTYPE html>
<html>
<head>
<title>Simple Programming Language Simulator</title>
<style>
body {
  font-family: monospace; /* Use a monospace font for the "old computer" look */
  background-color: #000; /* Dark background */
  color: #0f0; /* Green text */
}
#container {
    width: 80%;
    margin: 20px auto;
    border: 2px solid #0f0; /* Green border */
    padding: 10px;
}

#output {
  margin-top: 10px;
  border: 1px solid #0f0; /* Green border */
  padding: 5px;
  overflow-y: scroll;
  height: 300px;
  background-color: #000;
  color: #0f0;
}
#input-area {
    display: flex;
}
#instruction {
    flex-grow: 1; /* Input takes up available space */
    font-family: monospace;
    background-color: #000;
    color: #0f0;
    border: 1px solid #0f0;
    padding: 5px;
}
button {
    background-color: #0f0;
    color: #000;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    font-family: monospace;
    margin-left: 5px;
}
</style>
</head>
<body>
<div id="container">

<h1>Simple Programming Language</h1>

<div id="input-area">
<label for="instruction">Enter instruction:</label>
<input type="text" id="instruction" autofocus>
<button onclick="execute()">Run</button>
</div>

<div id="output"></div>

</div>

<script>
let variables = {}; // Store variables

function execute() {
  const instructionInput = document.getElementById("instruction");
  const instruction = instructionInput.value.trim();
  const outputDiv = document.getElementById("output");

  if (instruction.toUpperCase() === "HELP") {
    outputDiv.innerHTML += "Available commands:<br>";
    outputDiv.innerHTML += "PRINT &lt;message&gt;: Displays a message.<br>";
    outputDiv.innerHTML += "LET &lt;variable&gt; = &lt;value&gt;: Assigns a value to a variable.<br>";
    outputDiv.innerHTML += "PRINT &lt;variable&gt;: Displays the value of a variable.<br>";
    outputDiv.innerHTML += "Example: PRINT Hello World!<br>";
    outputDiv.innerHTML += "Example: LET x = 10<br>";
    outputDiv.innerHTML += "Example: PRINT x<br>";
    instructionInput.value = "";
    return;
  }

  const parts = instruction.split(" ");
  const command = parts[0].toUpperCase();

  switch (command) {
    case "PRINT":
      if (parts.length > 1) {
        let message = parts.slice(1).join(" "); // Get the entire message after PRINT
        if (message[0] === "\"") {
            message = message.slice(1, message.length-1);
        }
        if (variables[message] !== undefined) {
            message = variables[message];
        }
        outputDiv.innerHTML += message + "<br>";
      } else {
        outputDiv.innerHTML += "Error: PRINT command requires a message or variable name.<br>";
      }
      break;
    case "LET":
      if (parts.length === 4 && parts[2] === "=") {
        const variable = parts[1];
        const value = parts[3];
        if (!isNaN(value)) {
            variables[variable] = parseFloat(value);
        } else {
            variables[variable] = value;
        }
      } else {
        outputDiv.innerHTML += "Error: LET command requires the format: LET &lt;variable&gt; = &lt;value&gt;<br>";
      }
      break;
    default:
      outputDiv.innerHTML += "Error: Unknown command.<br>";
  }

  instructionInput.value = "";
  outputDiv.scrollTop = outputDiv.scrollHeight;
}
</script>

</body>
</html>
