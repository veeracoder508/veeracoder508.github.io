<!DOCTYPE html>
<html>
<head>
<title>CMD Simulator</title>
<style>
body {
    font-family: monospace; /* Use a monospace font for command-line look */
    background-color: #000; /* Black background */
    color: #0f0; /* Green text */
    padding: 10px;
    margin: 0;
    overflow: hidden; /* Prevent scrollbars */
}

#terminal {
    width: 95%; /* Adjust width as needed */
    height: 90vh; /* Adjust height as needed */
    overflow-y: scroll; /* Allow scrolling within the terminal */
    border: 1px solid #ccc;
    padding: 5px;
    white-space: pre-wrap; /* Preserve whitespace and wrap text */
}

#input-area {
    display: flex; /* Align prompt and input */
    margin-top: 10px;
}

#prompt {
    margin-right: 5px;
}

#user-input {
    flex-grow: 1; /* Input takes up available space */
    background-color: #000;
    color: #0f0;
    border: none;
    outline: none; /* Remove default outline */
}
</style>
</head>
<body>

<div id="terminal"></div>
<div id="input-area">
    <span id="prompt">C:\></span>
    <input type="text" id="user-input" autofocus onkeydown="handleInput(event)">
</div>

<script>
    const terminal = document.getElementById("terminal");
    const userInput = document.getElementById("user-input");
    const prompt = document.getElementById("prompt");

    function handleInput(event) {
        if (event.key === "Enter") {
            const command = userInput.value;
            terminal.innerHTML += `<span style="color:yellow;">C:\>${command}</span><br>`; // Display command with yellow color
            processCommand(command);
            userInput.value = ""; // Clear input
            terminal.scrollTop = terminal.scrollHeight; // Scroll to bottom
        }
    }

    function processCommand(command) {
      const parts = command.split(/\s+/); // Split by any whitespace
      const cmd = parts[0].toLowerCase();
      const args = parts.slice(1);

      if (cmd === "ping") {
        if (args.length === 1) {
          const host = args[0];
          terminal.innerHTML += `Pinging ${host}...<br>`;

          // Simulate ping (replace with actual ping functionality)
          setTimeout(() => {
            const success = Math.random() < 0.8; // 80% success rate (example)
            if (success) {
              terminal.innerHTML += `Reply from ${host}: bytes=32 time<1ms TTL=64<br>`;
            } else {
              terminal.innerHTML += `Request timed out.<br>`;
            }
            terminal.scrollTop = terminal.scrollHeight;
          }, 1000); // Simulate delay
        } else {
          terminal.innerHTML += "Usage: ping hostname<br>";
        }
      } else if (cmd === "cls" || cmd === "clear") {
        terminal.innerHTML = ""; // Clear terminal
      } else if (cmd === "help") {
        terminal.innerHTML += "Available commands: ping, cls/clear, help<br>";
      } else if (cmd === "echo") {
        terminal.innerHTML += args.join(" ") + "<br>";
      } else if (cmd === "cd") {
        terminal.innerHTML += "cd command is not yet implemented.<br>"; // Placeholder
      } else if (cmd === "dir" || cmd === "ls") {
        terminal.innerHTML += "dir/ls command is not yet implemented.<br>"; // Placeholder
      } else if (cmd === "exit") {
          window.close(); // Close the window (if allowed)
      }
      else if (cmd) {
        terminal.innerHTML += `'${cmd}' is not recognized.<br>`;
      }
    terminal.scrollTop = terminal.scrollHeight;
  }

    userInput.focus(); // Set focus to input on load
</script>

</body>
</html>
