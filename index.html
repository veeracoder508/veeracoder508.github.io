<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Converter</title>
    <style>
        body {
            font-family: monospace;
            background-color: #000;
            color: #0f0;
            margin: 20px;
            overflow: hidden; /* Prevent scrollbars */
        }

        #terminal {
            border: 2px solid #0f0;
            padding: 10px;
            height: 350px; /* Adjust as needed */
            overflow-y: scroll;
            background-color: rgba(0, 0, 0, 0.9); /* Slightly transparent */
        }

        .command-line {
            display: flex; /* Align prompt and input */
            align-items: center; /* Vertically align */
        }

        .prompt {
            margin-right: 5px;
        }

        #user-input {
            flex-grow: 1; /* Input takes up available space */
            background-color: #000;
            color: #0f0;
            border: none;
            outline: none; /* Remove default outline */
            padding: 0; /* Remove default padding */
        }

        .output {
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="terminal">
        <div class="command-line">
            <span class="prompt">C:\></span>
            <input type="text" id="user-input" autofocus onkeydown="handleInput(event)">
        </div>
    </div>

    <script>
        const terminal = document.getElementById("terminal");
        const userInput = document.getElementById("user-input");

        function handleInput(event) {
            if (event.key === "Enter") {
                const command = userInput.value;
                displayOutput(`C:\> ${command}`); // Show the entered command

                const result = processCommand(command);
                displayOutput(result);

                userInput.value = ""; // Clear input
                scrollToBottom(); // Keep scrolled to the bottom
            }
        }

        function processCommand(command) {
            command = command.trim().toLowerCase();

            if (command.startsWith("bin2dec")) {
                const binary = command.substring(7).trim(); // Extract binary value
                if (/^[01]+$/.test(binary)) { // Check for valid binary (0s and 1s only)
                    const decimal = parseInt(binary, 2);
                    return `Decimal: ${decimal}`;
                } else {
                    return "Invalid binary input. Use only 0s and 1s.";
                }
            } else if (command.startsWith("dec2bin")) {
                const decimal = command.substring(7).trim();
                if (/^\d+$/.test(decimal)) { // Check for valid decimal (numbers only)
                  const binary = parseInt(decimal, 10).toString(2);
                  return `Binary: ${binary}`;
                } else {
                  return "Invalid decimal input. Use numbers only.";
                }
            }
             else if (command === "help") {
                return "Available commands: bin2dec [binary], dec2bin [decimal], help";
            }
            else {
                return "Unknown command. Type 'help' for available commands.";
            }
        }

        function displayOutput(text) {
            const outputDiv = document.createElement("div");
            outputDiv.className = "output";
            outputDiv.textContent = text;
            terminal.appendChild(outputDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            terminal.scrollTop = terminal.scrollHeight;
        }

        // Set focus on the input field when the page loads
        userInput.focus();
    </script>

</body>
</html>
