<!DOCTYPE html>
<html>
<head>
<title>Video Links</title>
<style>
body {
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  margin: 0;
  background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT2nN6a4J1hjDnaxyhgeFbmWIeB3_JYCtPR3u-ceQlDVQXeYe5MgDcN48PE&s=10');
  background-size: cover; /* Cover the entire viewport */
  background-repeat: no-repeat; /* Prevent image repetition */
  background-position: center; /* Center the image */
}

.video-container {
  margin: 20px;
  text-align: center;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  background-color: #6d3ad5;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

button:hover {
  background-color: #5528b3; /* Darker shade for hover effect */
}

h1 {
  color: #6d3ad5;
  font-family: monospace;
}
</style>
</head>
<body>

<h1>VIDEO</h1>

<div class="video-container">
  <button onclick="openVideo1()">Open Video 1</button>
</div>

<div class="video-container">
  <button onclick="openVideo2()">Open Video 2</button>
</div>

<div class="video-container">
  <button onclick="openVideo3()">Open Video 3</button>
</div>

<script>
function openVideo1() {
  window.open("https://drive.google.com/file/d/155oWsWE_-vIkLroLeAfJPZdfbZ2r4gSd/view?usp=drivesdk", "_blank");
}

function openVideo2() {
  window.open("https://drive.google.com/file/d/15FfVR_tDcMG9jcnCHEgqJk5dnZL_N-cS/view?usp=drivesdk", "_blank");
}

function openVideo3() {
  window.open("https://drive.google.com/file/d/150zVo8Hef0jd0znz5k_gvjI9jo6P4Uao/view?usp=drivesdk", "_blank");
}
</script>

</body>
</html>
