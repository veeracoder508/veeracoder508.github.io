<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Prompt Calculator</title>
    <style>
        body {
            background-color: #000; /* Black background */
            color: #0f0; /* Green text */
            font-family: monospace; /* Monospace font for command prompt feel */
            padding: 20px;
            overflow: hidden; /* Hide scrollbars */
        }

        #calculator {
            width: 400px;
            border: 2px solid #0f0;
            padding: 10px;
        }

        #display {
            background-color: #000;
            color: #0f0;
            border: none;
            width: calc(100% - 10px); /* Occupy full width */
            padding: 5px;
            margin-bottom: 10px;
            font-size: 16px;
            outline: none; /* Remove default outline on focus */
        }

        .row {
            display: flex;
            justify-content: space-between; /* Distribute buttons evenly */
            margin-bottom: 5px;
        }

        button {
            background-color: #222; /* Darker background for buttons */
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px 12px;
            font-family: monospace;
            cursor: pointer;
            width: 22%; /* Adjust width for spacing */
            box-sizing: border-box; /* Include padding and border in width */
        }

        button:hover {
            background-color: #333; /* Slightly lighter background on hover */
        }

        #history {
            margin-top: 10px;
            color: #0f0;
            overflow-y: auto; /* Add scrollbar if history overflows */
            max-height: 200px; /* Set a maximum height for the history */
            background-color: rgba(0, 0, 0, 0.5); /* Slightly transparent black background */
            padding: 5px;
            border: 1px solid #0f0;
        }

        .history-item {
            margin-bottom: 5px;
        }

    </style>
</head>
<body>

    <div id="calculator">
        <input type="text" id="display" readonly>
        <div class="row">
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button onclick="appendToDisplay('/')">/</button>
        </div>
        <div class="row">
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button onclick="appendToDisplay('*')">*</button>
        </div>
        <div class="row">
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="appendToDisplay('-')">-</button>
        </div>
        <div class="row">
            <button onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button onclick="calculate()">=</button>
            <button onclick="appendToDisplay('+')">+</button>
        </div>
        <div class="row">
            <button onclick="clearDisplay()">C</button>
            <button onclick="backspace()">DEL</button>
        </div>
        <div id="history">
        </div>

    </div>

    <script>
        let display = document.getElementById('display');
        let history = document.getElementById('history');

        function appendToDisplay(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = '';
        }

        function backspace() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            try {
                let result = eval(display.value);
                display.value = result;
                addToHistory(display.value);

            } catch (error) {
                display.value = 'Error';
                addToHistory("Error");
            }
        }

        function addToHistory(result) {
            let historyItem = document.createElement('div');
            historyItem.className = 'history-item';
            historyItem.textContent = display.value + " = " + result; // Store the equation
            history.appendChild(historyItem);
        }

    </script>

</body>
</html>
