⁸<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Converter</title>
    <style>
        body {
            font-family: monospace;
            background-color: #000;
            color: #0f0;
            margin: 20px;
            overflow: hidden; /* Prevent scrollbars */
        }

        #terminal {
            border: 2px solid #0f0;
            padding: 10px;
            height: 350px; /* Adjust as needed */
            overflow-y: scroll;
            background-color: rgba(0, 0, 0, 0.9); /* Slightly transparent */
        }

        .command-line {
            display: flex; /* Align prompt and input */
            align-items: center; /* Vertically align */
        }

        .prompt {
            margin-right: 5px;
        }
        #user-input {
            flex-grow: 1; /* Input takes up available space */
            background-color: #000;
            color: #0f0;
            border: none;
            outline: none; /* Remove default outline */
            padding: 0; /* Remove default padding */
        }

        .output {
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="terminal">
        <div class="command-line">
            <span class="prompt">C:\></span>
            <input type="text" id="user-input" autofocus onkeydown="handleInput(event)">
        </div>
    </div>

    <script>
        const terminal = document.getElementById("terminal");
        const userInput = document.getElementById("user-input");

        function handleInput(event) {
            if (event.key === "Enter") {
                const command = userInput.value;
                displayOutput(`C:\> ${command}`); // Show the entered command

                const result = processCommand(command);
                displayOutput(result);

                userInput.value = ""; // Clear input
                scrollToBottom(); // Keep scrolled to the bottom
            }
        }

        function processCommand(command) {
            command = command.trim().toLowerCase();
            const parts = command.split(" "); // Split command into parts

            const cmd = parts[0];
            let value = parts.slice(1).join(" "); // Join remaining parts for value

            if (cmd === "help") {
                return "Available commands: bin2dec [binary], dec2bin [decimal], hex2dec [hex], dec2hex [decimal], oct2dec [octal], dec2oct [decimal], unicode2char [unicode], char2unicode [character]";
            }

            if (!value) {
                return "Please provide a value after the command.";
            }


            switch (cmd) {
                case "bin2dec":
                    return convert(value, 2, 10, "Decimal");
                case "dec2bin":
                    return convert(value, 10, 2, "Binary");
                case "hex2dec":
                    return convert(value, 16, 10, "Decimal");
                case "dec2hex":
                    return convert(value, 10, 16, "Hexadecimal");
                case "oct2dec":
                    return convert(value, 8, 10, "Decimal");
                case "dec2oct":
                    return convert(value, 10, 8, "Octal");
                case "unicode2char":
                  return convertUnicodeToChar(value);
                case "char2unicode":
                  return convertCharToUnicode(value);
                default:
                    return "Unknown command. Type 'help' for available commands.";
            }
        }

        function convert(value, fromBase, toBase, toType) {
            const num = parseInt(value, fromBase);
            if (isNaN(num)) {
                return `Invalid input for ${fromBase === 2 ? 'Binary' : fromBase === 8 ? 'Octal' : fromBase === 16 ? 'Hexadecimal' : 'Decimal'}`;
            }
            return `${toType}: ${num.toString(toBase)}`;
        }

        function convertUnicodeToChar(unicode) {
          const codePoint = parseInt(unicode, 16); // Unicode is usually in hex
          if (isNaN(codePoint) || codePoint < 0 || codePoint > 0x10FFFF) {
            return "Invalid Unicode code point.";
          }
          return `Character: ${String.fromCodePoint(codePoint)}`;
        }

        function convertCharToUnicode(char) {
          if (char.length !== 1) {
            return "Please provide a single character.";
          }
          const codePoint = char.codePointAt(0).toString(16).toUpperCase();
          return `Unicode: U+${codePoint}`;
        }


        function displayOutput(text) {
            const outputDiv = document.createElement("div");
            outputDiv.className = "output";
            outputDiv.textContent = text;
            terminal.appendChild(outputDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            terminal.scrollTop = terminal.scrollHeight;
        }
    </script>

</body>
</html>
