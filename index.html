<!DOCTYPE html>
<html>
<head>
<title>Video Links</title>
<style>
body {
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
}

.video-button {
  padding: 10px 20px;
  margin: 10px;
  background-color: #4CAF50; /* Green */
  border: none;
  color: white;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  cursor: pointer;
  border-radius: 5px;
}

.video-button:hover {
  background-color: #3e8e41;
}

</style>
</head>
<body>

<h1>Video Links</h1>

<button class="video-button" onclick="openVideo('https://drive.google.com/file/d/155oWsWE_-vIkLroLeAfJPZdfbZ2r4gSd/view?usp=drivesdk')">Video 1</button>
<button class="video-button" onclick="openVideo('https://drive.google.com/file/d/15FfVR_tDcMG9jcnCHEgqJk5dnZL_N-cS/view?usp=drivesdk')">Video 2</button>
<button class="video-button" onclick="openVideo('https://drive.google.com/file/d/150zVo8Hef0jd0znz5k_gvjI9jo6P4Uao/view?usp=drivesdk')">Video 3</button>

<script>
function openVideo(url) {
  window.open(url, '_blank');
}
</script>

</body>
</html>
