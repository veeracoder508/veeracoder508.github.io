<!DOCTYPE html>
<html>
<head>
<title>QBasic-like Interpreter</title>
<style>
body { font-family: monospace; }
#output { border: 1px solid #ccc; padding: 5px; margin-bottom: 10px; }
</style>
</head>
<body>

<h1>QBasic-like Interpreter</h1>

<textarea id="code" rows="10" cols="50">
REM This is a QBasic-like program
INPUT "Enter your name: ", name$
PRINT "Hello, " + name$ + "!"

DIM numbers(5)
FOR i = 1 TO 5
  numbers(i) = i * 2
NEXT i

PRINT "Numbers array:"
FOR i = 1 TO 5
  PRINT numbers(i)
NEXT i

INPUT "Enter a number: ", num
IF num > 10 THEN
  PRINT "Number is greater than 10"
ELSEIF num = 10 THEN
  PRINT "Number is equal to 10"
ELSE
  PRINT "Number is less than 10"
END IF

</textarea><br>

<button onclick="runCode()">Run</button>

<div id="output"></div>

<script>
function runCode() {
  const code = document.getElementById("code").value;
  const outputDiv = document.getElementById("output");
  outputDiv.innerHTML = ""; // Clear previous output

  // Basic interpreter logic (simplified)
  const variables = {};
  const arrays = {};

  const lines = code.split('\n');

  for (const line of lines) {
    const trimmedLine = line.trim();
    if (trimmedLine.startsWith("REM")) {
      continue; // Skip comments
    }

    const parts = trimmedLine.split(" ");

    if (parts[0] === "INPUT") {
      const prompt = parts[1].replace(/"/g, ''); // Remove quotes
      const variableName = parts[3];
      const inputValue = prompt("Input: " + prompt);
      variables[variableName] = inputValue;

    } else if (parts[0] === "PRINT") {
      let output = "";
      for (let i = 1; i < parts.length; i++) {
          let part = parts[i];
          if (part.startsWith("\"")) {
              output += part.replace(/"/g, '');
          } else if (variables[part] !== undefined) {
              output += variables[part];
          } else if (part === "+"){
              output += part;
          } else {
              output += part; // Handle variables or strings
          }
      }

      outputDiv.innerHTML += output + "<br>";

    } else if (parts[0] === "DIM") {
      const arrayName = parts[1].split("(")[0];
      const arraySize = parseInt(parts[1].split("(")[1].split(")")[0]);
      arrays[arrayName] = new Array(arraySize);

    } else if (parts[0] === "FOR") {
      const loopVar = parts[1];
      const start = parseInt(parts[3]);
      const end = parseInt(parts[5]);
      let forBlock = [];
      let inFor = true;
      let j = lines.indexOf(trimmedLine) + 1;

      while (j < lines.length) {
          let currentLine = lines[j].trim();
          if (currentLine.startsWith("NEXT")) {
              inFor = false;
              break;
          }
          forBlock.push(currentLine);
          j++;
      }

      for (let i = start; i <= end; i++) {
          variables[loopVar] = i;
          for (const forLine of forBlock) {
              executeLine(forLine, variables, arrays, outputDiv);
          }
      }

    } else if (parts[0] === "IF") {
      const condition = parts.slice(1, parts.indexOf("THEN")).join(" ");
      const thenBlock = [];
      let inThen = true;
      let k = lines.indexOf(trimmedLine) + 1;
      while (k < lines.length) {
          let currentLine = lines[k].trim();
          if (currentLine.startsWith("ELSEIF") || currentLine.startsWith("ELSE") || currentLine.startsWith("END IF")) {
              inThen = false;
              break;
          }
          thenBlock.push(currentLine);
          k++;
      }
      const conditionValue = evaluateCondition(condition, variables);
      if (conditionValue) {
          for (const thenLine of thenBlock) {
              executeLine(thenLine, variables, arrays, outputDiv);
          }
      }
      // handle else if and else blocks
      let elseIfBlock = [];
      let elseBlock = [];
      let inElseIf = false;
      let inElse = false;
      while (k < lines.length) {
          let currentLine = lines[k].trim();
          if (currentLine.startsWith("ELSEIF")) {
              inElseIf = true;
              k++;
              while (k < lines.length) {
                  currentLine = lines[k].trim();
                  if (currentLine.startsWith("ELSEIF") || currentLine.startsWith("ELSE") || currentLine.startsWith("END IF")) {
                      inElseIf = false;
                      break;
                  }
                  elseIfBlock.push(currentLine);
                  k++;
              }
              const elseIfCondition = currentLine.slice(currentLine.indexOf(" ") + 1, currentLine.indexOf("THEN")).trim();
              const elseIfConditionValue = evaluateCondition(elseIfCondition, variables);
              if (elseIfConditionValue) {
                  for (const elseIfLine of elseIfBlock) {
                      executeLine(elseIfLine, variables, arrays, outputDiv);
                  }
                  break;
              }
          } else if (currentLine.startsWith("ELSE")) {
              inElse = true;
              k++;
              while (k < lines.length) {
                  currentLine = lines[k].trim();
                  if (currentLine.startsWith("END IF")) {
                      inElse = false;
                      break;
                  }
                  elseBlock.push(currentLine);
                  k++;
              }
              if (inElse) {
                  for (const elseLine of elseBlock) {
                      executeLine(elseLine, variables, arrays, outputDiv);
                  }
              }
              break;
          }
          k++;
      }

    } else if (parts[0].includes("(") && parts[0].includes(")")) { //Array assignment
      const arrayName = parts[0].split("(")[0];
      const index = parseInt(parts[0].split("(")[1].split(")")[0]);
      const value = parseInt(parts[2]);
      arrays[arrayName][index] = value;
    }

  }
}

function executeLine(line, variables, arrays, outputDiv) {
    const parts = line.split(" ");
    if (parts[0] === "PRINT") {
        let output = "";
        for (let i = 1; i < parts.length; i++) {
            let part = parts[i];
            if (part.startsWith("\"")) {
                output += part.replace(/"/g, '');
            } else if (variables[part] !== undefined) {
                output += variables[part];
            } else if (part === "+"){
                output += part;
            } else {
                output += part; // Handle variables or strings
            }
        }

        outputDiv.innerHTML += output + "<br>";
    } else if (parts[0].includes("(") && parts[0].includes(")")) { //Array assignment
        const arrayName = parts[0].split("(")[0];
        const index = parseInt(parts[0].split("(")[1].split(")")[0]);
        const value = parseInt(parts[2]);
        arrays[arrayName][index] = value;
    }
}

function evaluateCondition(condition, variables) {
  // Very basic condition evaluation (expand as needed)
    let parts = condition.split(" ");
    let left = parts[0];
    let operator = parts[1];
    let right = parts[2];
    if (variables[left] !== undefined) {
        left = variables[left];
    }
    if (variables[right] !== undefined) {
        right = variables[right];
    }

    if (operator === ">") {
        return parseFloat(left) > parseFloat(right);
    } else if (operator === "=") {
        return parseFloat(left) === parseFloat(right);
    } else if (operator === "<") {
        return parseFloat(left) < parseFloat(right);
    }
