<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <style>
        body {
            background-color: #000; /* Black background */
            color: #0f0; /* Green text */
            font-family: monospace; /* Monospace font */
            padding: 20px;
        }

        #calculator {
            border: 2px solid #0f0; /* Green border */
            padding: 10px;
            width: 300px;  /* Adjust width as needed */
            background-color: #111; /* Slightly darker background for calculator */
        }

        #display {
            background-color: #222; /* Darker background for display */
            color: #0f0;
            border: 1px solid #0f0;
            padding: 5px;
            margin-bottom: 10px;
            text-align: right; /* Align text to the right */
            font-size: 1.2em; /* Slightly larger font for display */
            overflow: hidden; /* Prevent overflow of long results */
            white-space: nowrap;   /* Prevent wrapping of the result */
        }

        button {
            background-color: #333; /* Darker button background */
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px;
            margin: 5px;
            width: 40px; /* Consistent button width */
            text-align: center; /* Center button text */
            font-family: monospace;
            cursor: pointer; /* Indicate clickable */
        }

        button:hover {
            background-color: #444; /* Slightly lighter on hover */
        }

        .operator {
            color: #ff0; /* Yellow for operators */
        }

        .function {
          color: #0ff; /* Cyan for functions */
        }

    </style>
</head>
<body>

    <h1>Scientific Calculator</h1>

    <div id="calculator">
        <div id="display">0</div>
        <div>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">/</button>
            <button class="function">sin</button>
        </div>
        <div>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">*</button>
            <button class="function">cos</button>
        </div>
        <div>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">-</button>
            <button class="function">tan</button>
        </div>
        <div>
            <button>0</button>
            <button>.</button>
            <button class="operator">+</button>
            <button class="operator">=</button>
            <button class="function">sqrt</button>
        </div>
        <div>
          <button class="function">C</button>  <button class="function">( )</button>
          <button class="function">^</button>
          <button class="function">log</button>
          <button class="function">π</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const buttons = document.querySelectorAll('button');

        let currentInput = '';
        let result = 0;

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const buttonText = button.textContent;

                switch (buttonText) {
                    case '=':
                        try {
                            result = eval(currentInput); // Use eval cautiously!
                            display.textContent = result;
                            currentInput = result.toString();
                        } catch (error) {
                            display.textContent = 'Error';
                            currentInput = '';
                        }
                        break;
                    case 'C': // Clear
                        display.textContent = '0';
                        currentInput = '';
                        result = 0;
                        break;
                    case 'sin': currentInput = Math.sin(eval(currentInput)); display.textContent = currentInput; break;
                    case 'cos': currentInput = Math.cos(eval(currentInput)); display.textContent = currentInput; break;
                    case 'tan': currentInput = Math.tan(eval(currentInput)); display.textContent = currentInput; break;
                    case 'sqrt': currentInput = Math.sqrt(eval(currentInput)); display.textContent = currentInput; break;
                    case 'log': currentInput = Math.log10(eval(currentInput)); display.textContent = currentInput; break;
                    case 'π': currentInput += Math.PI; display.textContent = currentInput; break;
                    case '( )':
                        if (currentInput.includes('(')) {
                            currentInput += ')';
                        } else {
                            currentInput += '(';
                        }
                        display.textContent = currentInput;
                        break;
                    case '^': currentInput += '**'; display.textContent = currentInput; break;

                    default:
                        currentInput += buttonText;
                        display.textContent = currentInput;
                }
            });
        });
    </script>

</body>
</html>
