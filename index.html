<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini-like AI Chat</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0; /* Light gray background */
        }

        #chat-container {
            flex: 1; /* Takes up available space */
            padding: 20px;
            overflow-y: scroll; /* Scrollable chat area */
        }

        .message {
            margin-bottom: 10px;
            padding: 12px;
            border-radius: 8px;
            max-width: 80%; /* Prevent messages from being too wide */
        }

        .user-message {
            background-color: #e0f2f7; /* Light blue for user */
            align-self: flex-end; /* Align to the right */
        }

        .ai-message {
            background-color: #ffffff; /* White for AI */
            align-self: flex-start; /* Align to the left */
        }

        #input-area {
            padding: 10px;
            display: flex;
            background-color: #fff;
        }

        #user-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-right: 10px;
        }

        #send-button {
            padding: 8px 16px;
            background-color: #4285f4; /* Blue send button */
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type your message...">
        <button id="send-button" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        function sendMessage() {
            const message = userInput.value.trim(); // Get user input and remove whitespace
            if (message === "") return; // Don't send empty messages

            appendMessage(message, 'user'); // Append user message

            // Here you would normally send the message to your AI backend
            // and receive a response.  This is a placeholder for that.
            setTimeout(() => { // Simulate a delay for the AI response
                const aiResponse = generateAIResponse(message); // Replace with your actual AI logic
                appendMessage(aiResponse, 'ai');
            }, 500); // 0.5 second delay


            userInput.value = ''; // Clear the input field
        }

        function appendMessage(message, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', `${sender}-message`);
            messageDiv.textContent = message;
            chatContainer.appendChild(messageDiv);

            // Scroll to the bottom to show the latest message
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Placeholder for AI response generation.  Replace this with your real AI interaction.
        function generateAIResponse(userMessage) {
            // Replace this with your actual AI logic or API call.
            // This is just a very basic example.
            const responses = [
                "I understand. Please elaborate.",
                "That's an interesting point.  Tell me more.",
                "I'm still learning, but I'll try my best to answer.",
                "Let's explore that further.",
                "What are your thoughts on that?"
            ];

            const randomIndex = Math.floor(Math.random() * responses.length);
            return responses[randomIndex];
        }


        // Allow sending message with Enter key
        userInput.addEventListener("keyup", function(event) {
          if (event.keyCode === 13) { // 13 is the Enter key code
            sendMessage();
          }
        });

    </script>

</body>
</html>
