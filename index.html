<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Image</title>
</head>
<body>
  <h1>Click the link below to download the image</h1>

  <!-- Instructions for downloading the image -->
  <a href="path-to-image/image.jpg" download="downloaded-image.jpg">
    <img src="path-to-image/image.jpg" alt="Image to download" style="width: 200px; height: auto;">
    <br>Download Image
  </a>

  <!-- Replace "path-to-image/image.jpg" with the actual path of your image file -->
</body>
</html>
