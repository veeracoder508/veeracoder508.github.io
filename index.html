<!DOCTYPE html>
<html>
<head>
<title>PowerShell Converter</title>
<style>
body {
    font-family: Consolas, monospace; /* PowerShell font */
    background-color: #012456; /* PowerShell blue */
    color: #f0f0f0; /* Light gray text */
    padding: 20px;
}

#container {
    width: 600px;
    margin: 0 auto;
    border: 1px solid #ccc;
    padding: 20px;
    background-color: #001f3f; /* Darker blue for container */
    border-radius: 5px;
}

label {
    display: block;
    margin-bottom: 5px;
}

select, input[type="text"] {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    background-color: #003366; /* Slightly darker input background*/
    color: #f0f0f0;
    border: 1px solid #0056b3; /* Lighter border */
    border-radius: 3px;
}

button {
    background-color: #0078d7; /* PowerShell blue button */
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
}

#output {
    margin-top: 20px;
    padding: 10px;
    background-color: #000; /* Black output background */
    color: #0f0; /* Green output text (like a console) */
    border-radius: 5px;
    white-space: pre-wrap; /* Preserve whitespace */
    overflow-y: auto; /* Add scroll if needed */
    max-height: 200px; /* Set a max height */
}

/* Optional: Add a little "PS>" prompt */
#output::before {
    content: "PS> ";
}
</style>
</head>
<body>

<div id="container">
    <h1>PowerShell Converter</h1>

    <label for="inputType">Input Type:</label>
    <select id="inputType">
        <option value="binary">Binary</option>
        <option value="hex">Hexadecimal</option>
        <option value="octal">Octal</option>
        <option value="decimal">Decimal</option>
        <option value="string">String</option>
    </select>

    <label for="inputValue">Input Value:</label>
    <input type="text" id="inputValue">

    <label for="outputType">Output Type:</label>
    <select id="outputType">
        <option value="binary">Binary</option>
        <option value="hex">Hexadecimal</option>
        <option value="octal">Octal</option>
        <option value="decimal">Decimal</option>
        <option value="string">String</option>
    </select>

    <button onclick="convert()">Convert</button>

    <div id="output"></div>
</div>

<script>
function convert() {
    const inputValue = document.getElementById("inputValue").value;
    const inputType = document.getElementById("inputType").value;
    const outputType = document.getElementById("outputType").value;
    const outputDiv = document.getElementById("output");
    outputDiv.innerHTML = ""; // Clear previous output


    let decimalValue;

    // Convert to decimal first
    switch (inputType) {
        case "binary":
            decimalValue = parseInt(inputValue, 2);
            break;
        case "hex":
            decimalValue = parseInt(inputValue, 16);
            break;
        case "octal":
            decimalValue = parseInt(inputValue, 8);
            break;
        case "decimal":
            decimalValue = parseInt(inputValue);
            break;
        case "string":
            decimalValue = "";
            for (let i = 0; i < inputValue.length; i++) {
                decimalValue += inputValue.charCodeAt(i) + " ";
            }
            decimalValue = decimalValue.trim();
            break;
    }

    let outputValue;

    // Convert from decimal to desired output
    switch (outputType) {
        case "binary":
            if (inputType === "string") {
                outputValue = "";
                const charCodes = decimalValue.split(" ");
                for (const code of charCodes) {
                    outputValue += parseInt(code).toString(2) + " ";
                }
                outputValue = outputValue.trim();
            } else {
                outputValue = decimalValue.toString(2);
            }
            break;
        case "hex":
            if (inputType === "string") {
                outputValue = "";
                const charCodes = decimalValue.split(" ");
                for (const code of charCodes) {
                    outputValue += parseInt(code).toString(16) + " ";
                }
                outputValue = outputValue.trim();
            } else {
                outputValue = decimalValue.toString(16);
            }
            break;
        case "octal":
            if (inputType === "string") {
                outputValue = "";
                const charCodes = decimalValue.split(" ");
                for (const code of charCodes) {
                    outputValue += parseInt(code).toString(8) + " ";
                }
                outputValue = outputValue.trim();
            } else {
                outputValue = decimalValue.toString(8);
            }
            break;
        case "decimal":
            outputValue = decimalValue;
            break;
        case "string":
            outputValue = "";
            if (inputType !== "string") {
                const charCodes = decimalValue.toString().split("");
                for (const code of charCodes) {
                   outputValue += String.fromCharCode(parseInt(code));
                }
            } else {
                outputValue = inputValue;
            }
            break;
    }

    outputDiv.innerHTML = outputValue;
}
</script>

</body>
</html>
