<!DOCTYPE html>
<html>
<head>
<title>Command Simulator</title>
<style>
body {
  font-family: monospace; /* Use a monospace font for command output */
}
#terminal {
  width: 600px;
  height: 300px;
  border: 1px solid #ccc;
  overflow-y: scroll;
  background-color: #000; /* Black background */
  color: #fff; /* White text */
  padding: 10px;
}
#input-area {
  width: 100%;
  padding: 5px;
  margin-top: 10px;
  box-sizing: border-box;
  background-color: #000;
  color: #fff;
  border: 1px solid #ccc;
}
</style>
</head>
<body>

<h1>Command Simulator</h1>

<div id="terminal"></div>
<input type="text" id="input-area" placeholder="Enter command...">

<script>
  const terminal = document.getElementById("terminal");
  const inputArea = document.getElementById("input-area");

  inputArea.addEventListener("keyup", function(event) {
    if (event.key === "Enter") {
      executeCommand();
    }
  });

  function executeCommand() {
    const command = inputArea.value;
    terminal.innerHTML += `$ ${command}<br>`; // Display user command

    const parts = command.split(/\s+/); // Split by any whitespace
    const cmd = parts[0].toLowerCase();
    const args = parts.slice(1);

    if (cmd === "ping") {
      handlePing(args);
    } else if (cmd === "openweb") {
      handleOpenWeb(args);
    } else if (cmd === "cls" || cmd === "clear") {
      terminal.innerHTML = ""; // Clear terminal
    } else if (cmd === "help") {
        terminal.innerHTML += "Available commands: ping, openweb, cls/clear, help<br>";
    } else {
      terminal.innerHTML += `Command '${cmd}' not recognized.<br>`;
    }

    inputArea.value = ""; // Clear input
    terminal.scrollTop = terminal.scrollHeight; // Scroll to bottom
  }

  function handlePing(args) {
    if (args.length === 1) {
      const target = args[0];
      terminal.innerHTML += `Pinging ${target}...<br>`;

      // Simulate ping (replace with actual ping if needed)
      setTimeout(() => {
        const success = Math.random() < 0.8; // 80% chance of "success"
        if (success) {
          terminal.innerHTML += `Reply from ${target}: Bytes=32 time<1ms TTL=64<br>`;
        } else {
          terminal.innerHTML += `Request timed out.<br>`;
        }
        terminal.scrollTop = terminal.scrollHeight;
      }, 500); // Simulate delay
    } else {
      terminal.innerHTML += "Usage: ping hostname/IP<br>";
    }
  }

  function handleOpenWeb(args) {
    if (args.length === 1) {
      const url = args[0];
      let fullUrl = url;
      if (!url.startsWith("http://") && !url.startsWith("https://")) {
        fullUrl = "http://" + url; // Add http:// if not present
      }
      terminal.innerHTML += `Opening ${fullUrl}...<br>`;

      try {
        window.open(fullUrl, "_blank"); // Open in new tab/window
        terminal.innerHTML += `Opened ${fullUrl} in a new tab.<br>`;
      } catch (error) {
        terminal.innerHTML += `Could not open ${fullUrl}.<br>`;
      }
    } else {
      terminal.innerHTML += "Usage: openweb URL<br>";
    }
  }
</script>

</body>
</html>
