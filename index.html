<!DOCTYPE html>
<html>
<head>
<title>Binary Computer Simulator</title>
<style>
body {
  font-family: monospace;
  background-color: #000;
  color: #0f0;
  padding: 20px;
}

#terminal {
  width: 800px; /* Adjust as needed */
  height: 400px; /* Adjust as needed */
  overflow-y: scroll;
  border: 2px solid #0f0;
  padding: 10px;
}

#input-area {
  display: flex;
  margin-top: 10px;
}

#prompt {
  margin-right: 5px;
}

#command-input {
  flex-grow: 1;
  background-color: #000;
  color: #0f0;
  border: none;
  outline: none;
}
</style>
</head>
<body>

<h1>Binary Computer Simulator</h1>

<div id="terminal"></div>

<div id="input-area">
  <span id="prompt">>></span>
  <input type="text" id="command-input" autofocus>
</div>

<script>
const terminal = document.getElementById('terminal');
const commandInput = document.getElementById('command-input');

commandInput.addEventListener('keydown', function(event) {
  if (event.key === 'Enter') {
    const command = commandInput.value;
    terminal.innerHTML += ">> " + command + "<br>"; // Display the command

    // Process the command (replace with your binary logic)
    let output = processCommand(command);
    terminal.innerHTML += output + "<br>";

    commandInput.value = ""; // Clear the input field
    terminal.scrollTop = terminal.scrollHeight; // Scroll to the bottom
  }
});


function processCommand(command) {
  command = command.trim().toLowerCase();

  if (command === "help") {
      return "Available commands:  'help', 'binary <value>', 'decimal <value>' ";
  } else if (command.startsWith("binary ")) {
    try {
      let decimal = parseInt(command.substring(7));
      if (isNaN(decimal)) {
        return "Invalid decimal input.";
      }
      let binary = decimal.toString(2);
      return "Binary: " + binary;

    } catch (error) {
       return "Invalid input. Please enter a valid decimal number.";
    }

  } else if (command.startsWith("decimal ")) {
    try {
      let binary = command.substring(8).replace(/[^01]/g, ''); // Remove non-binary chars
      let decimal = parseInt(binary, 2);
      if (isNaN(decimal)) {
        return "Invalid binary input.";
      }
      return "Decimal: " + decimal;
    } catch (error) {
      return "Invalid input. Please enter a valid binary number.";
    }

  } else if (command === "clear") {
    terminal.innerHTML = "";  // Clear the terminal
    return "";
  } else {
    return "Unknown command. Type 'help' for available commands.";
  }
}


// Initial prompt
terminal.innerHTML += "Welcome to the Binary Computer Simulator!<br>";
terminal.innerHTML += "Type 'help' for available commands.<br>";

</script>

</body>
</html>
