<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Converter</title>
    <style>
        body {
            background-color: #000; /* Black background */
            color: #0f0; /* Green text */
            font-family: monospace; /* Monospace font for command prompt feel */
            padding: 20px;
            margin: 0; /* Remove default margins */
            overflow: hidden; /* Prevent scrollbars */
        }

        #terminal {
            width: 80%; /* Adjust width as needed */
            margin: 0 auto;
            border: 2px solid #0f0;
            padding: 10px;
            overflow-y: auto; /* Add scrollbar if content overflows */
            height: 400px; /* Set a fixed height or adjust as needed */
        }

        .command {
            margin-bottom: 5px;
        }

        .prompt {
            display: inline-block;
            margin-right: 5px;
        }

        .output {
            margin-left: 20px; /* Indent output */
        }

        input[type="text"] {
            background-color: #000;
            color: #0f0;
            border: none;
            font-family: monospace;
            padding: 2px;
        }

        select {
          background-color: #000;
          color: #0f0;
          border: none;
          font-family: monospace;
        }

        button {
            background-color: #000;
            color: #0f0;
            border: 1px solid #0f0;
            font-family: monospace;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="terminal">
    <div class="command">
        <span class="prompt">&gt; Enter number:</span>
        <input type="text" id="numberInput">
        <select id="inputType">
            <option value="decimal">Decimal</option>
            <option value="binary">Binary</option>
            <option value="hex">Hexadecimal</option>
            <option value="octal">Octal</option>
            <option value="unicode">Unicode</option>
        </select>
        <button onclick="convertNumber()">Convert</button>
    </div>
    <div class="command">
        <span class="prompt">&gt; Binary:</span>
        <span class="output" id="binaryOutput"></span>
    </div>
    <div class="command">
        <span class="prompt">&gt; Hexadecimal:</span>
        <span class="output" id="hexOutput"></span>
    </div>
    <div class="command">
        <span class="prompt">&gt; Octal:</span>
        <span class="output" id="octalOutput"></span>
    </div>
    <div class="command">
        <span class="prompt">&gt; Unicode:</span>
        <span class="output" id="unicodeOutput"></span>
    </div>

</div>


<script>
    function convertNumber() {
        const numberInput = document.getElementById("numberInput").value;
        const inputType = document.getElementById("inputType").value;

        let decimalValue;

        if (inputType === "decimal") {
            decimalValue = parseInt(numberInput, 10);
        } else if (inputType === "binary") {
            decimalValue = parseInt(numberInput, 2);
        } else if (inputType === "hex") {
            decimalValue = parseInt(numberInput, 16);
        } else if (inputType === "octal") {
            decimalValue = parseInt(numberInput, 8);
        } else if (inputType === "unicode") {
          decimalValue = numberInput.charCodeAt(0); // Get Unicode code point.  Handles single characters.
        } else {
            alert("Invalid input type.");
            return;
        }

        if (isNaN(decimalValue)) {
            alert("Invalid number input.");
            return;
        }

        const binaryOutput = decimalValue.toString(2);
        const hexOutput = decimalValue.toString(16).toUpperCase(); // Convert to uppercase hex
        const octalOutput = decimalValue.toString(8);
        const unicodeOutput = String.fromCharCode(decimalValue);  // Convert back to character


        document.getElementById("binaryOutput").textContent = binaryOutput;
        document.getElementById("hexOutput").textContent = hexOutput;
        document.getElementById("octalOutput").textContent = octalOutput;
        document.getElementById("unicodeOutput").textContent = unicodeOutput;
    }
</script>

</body>
</html>
