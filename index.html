<!DOCTYPE html>
<html>
<head>
<title>Binary Computer Simulator</title>
<style>
body {
  font-family: monospace; /* Monospace font for old computer look */
  background-color: #000; /* Dark background */
  color: #bcbdbb; /* Green text */
  padding: 20px;
}

#container {
    width: 600px; /* Set a fixed width for the "screen" */
    margin: 0 auto; /* Center the container */
    border: 2px solid #bcbdbb; /* Green border */
    padding: 10px;
}

h1 {
  color: #bcbdbb;
  text-align: center;
  margin-bottom: 20px;
}

#input-area {
  display: flex;
}

#instruction {
  flex-grow: 1; /* Input takes up available space */
  background-color: #000;
  color: #bcbdbb;
  border: 1px solid #bcbdbb;
  padding: 5px;
  font-family: monospace;
}

button {
  background-color: #000;
  color: #bcbdbb;
  border: 1px solid #bcbdbb;
  padding: 5px 10px;
  margin-left: 5px;
  font-family: monospace;
  cursor: pointer; /* Make it look clickable */
}

#output {
  margin-top: 10px;
  border: 1px solid #bcbdbb;
  padding: 5px;
  overflow-y: scroll;
  height: 250px; /* Set a maximum height */
  background-color: #000;
  color: #bcbdbb;
  font-family: monospace;
}

/* Blinking cursor effect */
#instruction::selection {
    background-color: transparent; /* Make the selection transparent */
}
#instruction {
    caret-color: #bcbdbb /* Green cursor */
    animation: blink 1s infinite step-start; /* Blink animation */
}
@keyframes blink {
    50% {
        caret-color: transparent;
    }
}

</style>
</head>
<body>
<div id="container">
<h1>Binary Computer Simulator</h1>

<div id="input-area">
    <input type="text" id="instruction" autofocus>
    <button onclick="execute()">Execute</button>
</div>

<div id="output"></div>
</div>


<script>
function execute() {
  const instructionInput = document.getElementById("instruction");
  const instruction = instructionInput.value.trim().toUpperCase(); // Convert to uppercase

  const outputDiv = document.getElementById("output");

  if (instruction === "HELP") {
    outputDiv.innerHTML += "Example: ADD 0101 1010 (Adds the binary numbers 0101 and 1010)<br>";
        outputDiv.innerHTML += "Supported Instructions: <br>"+
        "ADD: Adds two binary numbers. <br>"+
        "SUB: Subtracts two binary numbers. <br>"+
        "MUL: Multiplies two binary numbers. <br>"+
        "DIV: Divides two binary numbers. <br>"+
        "HLT: Halts the program. <br>";
    instructionInput.value = ""; // Clear input field
    return;
  }
  const parts = instruction.split(" ");
  const opcode = parts[0];

  if (parts.length === 3) {
    const operand1 = parts[1];
    const operand2 = parts[2];

    if (isBinary(operand1) && isBinary(operand2)) {
      let result;
      switch (opcode) {
        case "ADD":
          result = binaryAdd(operand1, operand2);
          break;
        case "SUB":
          result = binarySubtract(operand1, operand2);
          break;
        case "MUL":
          result = binaryMultiply(operand1, operand2);
          break;
        case "DIV":
          result = binaryDivide(operand1, operand2);
          break;
        default:
          result = "Invalid opcode.";
      }
      outputDiv.innerHTML += instruction + " = " + result + "<br>";
    } else {
      outputDiv.innerHTML += "Invalid operands. Operands must be binary numbers.<br>";
    }
  } else if (opcode === "HLT") {
      outputDiv.innerHTML += instruction + "<br>";
  }
  
  else {
    outputDiv.innerHTML += "Invalid instruction format.<br>";
  }

  instructionInput.value = ""; // Clear input field
  outputDiv.scrollTop = outputDiv.scrollHeight; // Scroll to bottom
}


function isBinary(num) {
  return /^[01]+$/.test(num);
}

// Binary arithmetic functions (example: ADD)
function binaryAdd(a, b) {
    return (parseInt(a, 2) + parseInt(b, 2)).toString(2);
}
function binarySubtract(a, b) {
    return (parseInt(a, 2) - parseInt(b, 2)).toString(2);
}
function binaryMultiply(a, b) {
    return (parseInt(a, 2) * parseInt(b, 2)).toString(2);
}

function binaryDivide(a, b) {
    if (b === "0") {
        return "Division by zero!";
    }
    return (parseInt(a, 2) / parseInt(b, 2)).toString(2);
}
</script>

</body>
</html>
