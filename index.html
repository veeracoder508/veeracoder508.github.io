<!DOCTYPE html>
<html>
<head>
<title>DeepSeek AI Chat</title>
<style>
  #chat-container {
    width: 500px;
    margin: 0 auto;
    border: 1px solid #ccc;
    padding: 10px;
  }
  #chat-log {
    height: 300px;
    overflow-y: scroll;
    padding: 5px;
  }
  #user-input {
    width: 100%;
    padding: 5px;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div id="chat-container">
  <h1>DeepSeek AI Chat</h1>
  <div id="chat-log"></div>
  <input type="text" id="user-input" placeholder="Type your message...">
  <button onclick="sendMessage()">Send</button>
</div>

<script>
  const apiKey = 'sk-356d7a828a004969b25687e33be75358'; // Replace with your actual API key
  const chatLog = document.getElementById('chat-log');
  const userInput = document.getElementById('user-input');

  function sendMessage() {
    const message = userInput.value;
    if (message.trim() === "") return; // Don't send empty messages

    displayMessage(message, true); // Display user message

    // Send message to DeepSeek API
    fetch('https://platform.deepseek.com/api_keys', { // Replace with the correct DeepSeek API endpoint
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: "deepseek-chat", // Or the specific model name you want to use
        messages: [{ role: "user", content: message }]
      })
    })
    .then(response => response.json())
    .then(data => {
      if (data.choices && data.choices.length > 0) {
        const reply = data.choices[0].message.content;
        displayMessage(reply, false); // Display AI reply
      } else {
        displayMessage("Error: Could not get a response from the AI.", false);
        console.error("DeepSeek API Error:", data); // Log the error for debugging
      }
    })
    .catch(error => {
      displayMessage("Error: Could not connect to the AI.", false);
      console.error("Fetch Error:", error);
    });


    userInput.value = ''; // Clear input field
  }

  function displayMessage(message, isUser) {
    const messageDiv = document.createElement('div');
    messageDiv.className = isUser ? 'user-message' : 'ai-message';
    messageDiv.textContent = message;
    chatLog.appendChild(messageDiv);
    chatLog.scrollTop = chatLog.scrollHeight; // Scroll to bottom
  }

  userInput.addEventListener("keyup", function(event) {
    if (event.keyCode === 13) { // Enter key pressed
      sendMessage();
    }
  });

</script>

</body>
</html>
