<!DOCTYPE html>
<html>
<head>
<title>Simple Programming Language Interpreter</title>
<style>
body {
  font-family: monospace;
}
#output {
  margin-top: 10px;
  border: 1px solid #ccc;
  padding: 5px;
  overflow-y: scroll;
  height: 200px;
}
#console {
    border: 1px solid #ccc;
    padding: 5px;
    background-color: #f0f0f0; /* Light gray background for console */
}
</style>
</head>
<body>

<h1>Simple Programming Language Interpreter</h1>

<div id="console">
<label for="code">Enter code:</label><br>
<textarea id="code" rows="5" cols="50"></textarea><br>
<button onclick="execute()">Run</button>
</div>

<div id="output"></div>

<script>
function execute() {
  const codeInput = document.getElementById("code");
  const code = codeInput.value;
  const outputDiv = document.getElementById("output");

  if (code.trim().toUpperCase() === "HELP") {
    outputDiv.innerHTML += "Example: PRINT(\"Hello, world!\")<br>";
    outputDiv.innerHTML += "Supported commands:<br>" +
                         "PRINT(message): Prints the message to the output.<br>" +
                         "LET variable = value: Assigns a value to a variable.<br>" +
                         "IF condition: Starts a conditional block. <br>" +
                         "ENDIF: Ends a conditional block. <br>" +
                         "Example IF condition: IF x > 5 <br>" +
                         "Variables are case-sensitive.<br>";
    codeInput.value = "";
    return;
  }

  try {
      const lines = code.split('\n');
      let variables = {}; // Store variables
      let inIfBlock = false;

      for (const line of lines) {
          const trimmedLine = line.trim();
          if (trimmedLine === "") continue; // Skip empty lines

          if (trimmedLine.startsWith("PRINT(")) {
              const message = trimmedLine.substring(6, trimmedLine.length - 1);
              outputDiv.innerHTML += message + "<br>";
          } else if (trimmedLine.startsWith("LET ")) {
              const parts = trimmedLine.substring(4).split("=");
              const variable = parts[0].trim();
              const value = parts[1].trim();
              variables[variable] = value;
          } else if (trimmedLine.startsWith("IF ")) {
              const condition = trimmedLine.substring(3).trim();
              const parts = condition.split(" ");
              const varName = parts[0];
              const operator = parts[1];
              const compareValue = parts[2];

              if (!(varName in variables)) {
                  throw new Error("Variable '" + varName + "' not defined.");
              }

              const varValue = variables[varName];
              let conditionResult;

              if (operator === ">") {
                  conditionResult = parseFloat(varValue) > parseFloat(compareValue);
              } else if (operator === "<") {
                  conditionResult = parseFloat(varValue) < parseFloat(compareValue);
              } else if (operator === ">=") {
                  conditionResult = parseFloat(varValue) >= parseFloat(compareValue);
              } else if (operator === "<=") {
                  conditionResult = parseFloat(varValue) <= parseFloat(compareValue);
              } else if (operator === "==") {
                  conditionResult = varValue == compareValue;
              } else {
                  throw new Error("Invalid operator: " + operator);
              }

              inIfBlock = conditionResult; // Set if block state
          } else if (trimmedLine === "ENDIF") {
              inIfBlock = false;
          } else if (inIfBlock) {
              // Execute code inside the if block (currently only PRINT)
              if (trimmedLine.startsWith("PRINT(")) {
                  const message = trimmedLine.substring(6, trimmedLine.length - 1);
                  outputDiv.innerHTML += message + "<br>";
              }
          }

          else {
              throw new Error("Invalid command: " + trimmedLine);
          }
      }
  } catch (error) {
    outputDiv.innerHTML += "Error: " + error.message + "<br>";
  }

  codeInput.value = ""; // Clear input
  outputDiv.scrollTop = outputDiv.scrollHeight;
}


</script>

</body>
</html>
