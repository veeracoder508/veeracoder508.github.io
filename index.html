<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converter</title>
    <style>
        body {
            background-color: #000; /* Black background */
            color: #0f0; /* Green text */
            font-family: monospace; /* Monospace font */
            padding: 20px;
            margin: 0;
            overflow: hidden; /* Prevents scrollbars */
        }

        #console {
            width: 95%; /* Occupy most of the width */
            max-height: 80vh; /* Limit maximum height */
            overflow-y: auto; /* Add vertical scroll if needed */
            border: 1px solid #0f0; /* Green border */
            padding: 10px;
        }

        .command-line {
            display: flex;
            align-items: center; /* Vertically center items */
        }

        .prompt {
            color: #0f0;
            margin-right: 5px;
        }

        #input {
            background-color: transparent; /* Transparent background */
            color: #0f0;
            border: none;
            outline: none;
            flex-grow: 1; /* Input takes up available space */
            font-family: monospace;
            font-size: inherit;
            padding: 0;
            min-width: 0; /* Prevents input from shrinking too much */
        }

        .output {
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div id="console">
    <div class="command-line">
        <span class="prompt">C:\></span>
        <input type="text" id="input" autofocus>
    </div>
</div>

<script>
    const consoleDiv = document.getElementById('console');
    const inputField = document.getElementById('input');

    inputField.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            const command = inputField.value;
            consoleDiv.innerHTML += `<div class="output">C:\> ${command}</div>`; // Display command

            const output = processCommand(command);
            consoleDiv.innerHTML += `<div class="output">${output}</div>`; // Display output

            inputField.value = ''; // Clear input field
            consoleDiv.scrollTop = consoleDiv.scrollHeight; // Scroll to bottom
        }
    });

    function processCommand(command) {
        command = command.trim();
        if (command === "") return ""; // Handle empty commands

        const parts = command.split(" ");
        const cmd = parts[0].toLowerCase();
        const arg = parts.slice(1).join(" ");

        try {
            switch (cmd) {
                case "bin": return parseInt(arg, 2).toString(10);
                case "hex": return parseInt(arg, 16).toString(10);
                case "oct": return parseInt(arg, 8).toString(10);
                case "unicode": return String.fromCharCode(parseInt(arg));
                default: return "Invalid command. Try 'bin', 'hex', 'oct', or 'unicode'.";
            }
        } catch (error) {
            return "Invalid input. Please provide a valid number.";
        }
    }


</script>

</body>
</html>
