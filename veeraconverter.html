<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINARY CONVERTER BY VEERARAVAN</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        header {
            background-color: #4285f4;
            color: white;
            padding: 10px 0;
            text-align: center;
        }

        main {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        button {
            background-color: #4285f4;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>BINARY CONVERTER BY VEERARAVAN</h1>
    </header>

    <main>
        <h2>Convert to Binary</h2>

        <label for="input">Enter Value:</label>
        <input type="text" id="input" placeholder="Enter decimal, hexadecimal, or octal value">

        <label for="conversionType">Select Conversion Type:</label>
        <select id="conversionType">
            <option value="decimal">Decimal</option>
            <option value="hexadecimal">Hexadecimal</option>
            <option value="octal">Octal</option>
        </select>

        <button onclick="convert()">Convert</button>

        <div id="result"></div>

        <script>
            function convert() {
                const inputValue = document.getElementById("input").value;
                const conversionType = document.getElementById("conversionType").value;
                let binary;

                switch (conversionType) {
                    case "decimal":
                        binary = decimalToBinary(inputValue);
                        break;
                    case "hexadecimal":
                        binary = hexadecimalToBinary(inputValue);
                        break;
                    case "octal":
                        binary = octalToBinary(inputValue);
                        break;
                }

                document.getElementById("result").innerHTML = `Binary: ${binary}`;
            }

            function decimalToBinary(decimal) {
                return (decimal >>> 0).toString(2);
            }

            function hexadecimalToBinary(hex) {
                return parseInt(hex, 16).toString(2);
            }

            function octalToBinary(octal) {
                return parseInt(octal, 8).toString(2);
            }
        </script>
    </main>

</body>
</html>
